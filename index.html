<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>코딩 쇼츠</title>
<style>
  :root { --bg:#000; --fg:#fff; --muted:#9aa0a6; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    overscroll-behavior:none; }
  #feed { height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory;
    scroll-behavior:smooth; }
  #feed::-webkit-scrollbar { display:none; }
  .slide { position:relative; height:100dvh; width:100%; scroll-snap-align:start;
    scroll-snap-stop:always; display:flex; align-items:center; justify-content:center;
    background:#000; overflow:hidden; }
  .thumb { position:absolute; inset:0; background-size:cover; background-position:center;
    filter:brightness(.55); transform:scale(1.1); }
  .player { position:relative; width:100%; height:100%; max-width:min(100vw,calc(100dvh*9/16));
    margin:0 auto; }
  .player iframe { width:100%; height:100%; border:0; display:block; }
  .play-badge { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; }
  .play-badge svg { width:74px; height:74px; opacity:.92; filter:drop-shadow(0 2px 10px rgba(0,0,0,.6)); }
  .meta { position:absolute; left:0; right:0; bottom:0; padding:18px 18px calc(26px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.45) 55%,transparent);
    pointer-events:none; }
  .meta .ch { font-size:13px; color:var(--muted); margin-bottom:6px; font-weight:600; }
  .meta .title { font-size:16px; line-height:1.4; font-weight:600;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .open { position:absolute; right:14px; bottom:calc(96px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; align-items:center; gap:4px; color:#fff;
    font-size:11px; text-decoration:none; pointer-events:auto; }
  .open .circle { width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,.14);
    backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; }
  .topbar { position:fixed; top:0; left:0; right:0; z-index:10;
    padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent); pointer-events:none; }
  .topbar .brand { font-weight:800; font-size:15px; letter-spacing:.3px; }
  .topbar .upd { font-size:11px; color:var(--muted); }
  .center { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:14px; color:var(--muted); text-align:center; padding:24px; }
  .spinner { width:34px; height:34px; border:3px solid rgba(255,255,255,.15);
    border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hint { position:fixed; left:0; right:0; bottom:calc(40px + env(safe-area-inset-bottom));
    text-align:center; color:var(--muted); font-size:13px; pointer-events:none;
    animation:fade 2.4s ease forwards; }
  @keyframes fade { 0%,70%{opacity:.9} 100%{opacity:0} }
</style>
</head>
<body>
<div class="topbar"><span class="brand">코딩 쇼츠</span><span class="upd" id="upd"></span></div>
<div id="feed"></div>
<div class="center" id="loading"><div class="spinner"></div><div>피드 불러오는 중…</div></div>

<script>
const PLAY_SVG = '<svg viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,.35)"/><path d="M9 7.5v9l8-4.5z"/></svg>';
const YT_SVG = '<svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M23 7.5a3 3 0 0 0-2.1-2.1C19 5 12 5 12 5s-7 0-8.9.4A3 3 0 0 0 1 7.5 31 31 0 0 0 .6 12 31 31 0 0 0 1 16.5a3 3 0 0 0 2.1 2.1C5 19 12 19 12 19s7 0 8.9-.4a3 3 0 0 0 2.1-2.1A31 31 0 0 0 23.4 12 31 31 0 0 0 23 7.5zM9.8 15.3V8.7l5.7 3.3z"/></svg>';

const feedEl = document.getElementById('feed');
let active = null;

function thumb(id){ return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`; }

function makeSlide(item){
  const s = document.createElement('section');
  s.className = 'slide';
  s.dataset.id = item.id;
  s.innerHTML = `
    <div class="thumb" style="background-image:url('${thumb(item.id)}')"></div>
    <div class="player"></div>
    <div class="play-badge">${PLAY_SVG}</div>
    <a class="open" href="https://www.youtube.com/shorts/${item.id}" target="_blank" rel="noopener">
      <span class="circle">${YT_SVG}</span>YouTube</a>
    <div class="meta">
      <div class="ch">@ ${item.channel || ''}</div>
      <div class="title">${(item.title||'').replace(/</g,'&lt;')}</div>
    </div>`;
  return s;
}

function play(slide){
  if(active === slide) return;
  if(active) stop(active);
  active = slide;
  const p = slide.querySelector('.player');
  const badge = slide.querySelector('.play-badge');
  const id = slide.dataset.id;
  const f = document.createElement('iframe');
  f.allow = 'autoplay; encrypted-media; picture-in-picture';
  f.allowFullscreen = true;
  f.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&playsinline=1&loop=1&playlist=${id}&controls=1&rel=0&modestbranding=1`;
  p.innerHTML = '';
  p.appendChild(f);
  if(badge) badge.style.display='none';
}
function stop(slide){
  const p = slide.querySelector('.player');
  const badge = slide.querySelector('.play-badge');
  if(p) p.innerHTML='';
  if(badge) badge.style.display='';
}

const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting && e.intersectionRatio>0.6) play(e.target); });
}, { root:feedEl, threshold:[0,0.6,1] });

function showMessage(html){
  document.getElementById('loading').innerHTML = html;
}

async function load(){
  try{
    const res = await fetch('feed.json?t='+Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    const items = (data.items||[]);
    if(!items.length){ showMessage('아직 쇼츠가 없어요.<br>매일 오전 8시에 채워집니다.'); return; }
    items.forEach(it=>{ const s=makeSlide(it); feedEl.appendChild(s); io.observe(s); });
    document.getElementById('loading').remove();
    if(data.updated){
      const d=new Date(data.updated);
      document.getElementById('upd').textContent='업데이트 '+d.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'})+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    }
    const hint=document.createElement('div'); hint.className='hint'; hint.textContent='↑ 위로 슬라이드해서 다음 쇼츠';
    document.body.appendChild(hint); setTimeout(()=>hint.remove(),2600);
    // 첫 슬라이드 자동재생
    requestAnimationFrame(()=>{ const first=feedEl.querySelector('.slide'); if(first) play(first); });
  }catch(err){
    showMessage('피드를 불러오지 못했어요.<br><small>'+err+'</small>');
  }
}
load();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
