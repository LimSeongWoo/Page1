<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>코딩 쇼츠</title>
<style>
  :root { --bg:#000; --fg:#fff; --muted:#9aa0a6; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    overscroll-behavior:none; }
  #feed { height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; scroll-behavior:smooth; }
  #feed::-webkit-scrollbar { display:none; }
  .slide { position:relative; height:100dvh; width:100%; scroll-snap-align:start; scroll-snap-stop:always;
    display:flex; align-items:center; justify-content:center; background:#000; overflow:hidden; }
  .thumb { position:absolute; inset:0; background-size:cover; background-position:center; filter:brightness(.5); transform:scale(1.1); }
  .player { position:relative; width:100%; height:100%; max-width:min(100vw,calc(100dvh*9/16)); margin:0 auto; }
  .player iframe, .player > div { width:100%; height:100%; border:0; display:block; }
  .play-badge { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .play-badge svg { width:74px; height:74px; opacity:.92; filter:drop-shadow(0 2px 10px rgba(0,0,0,.6)); }
  .meta { position:absolute; left:0; right:0; bottom:0; padding:18px 18px calc(26px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.45) 55%,transparent); pointer-events:none; }
  .meta .ch { font-size:13px; color:var(--muted); margin-bottom:6px; font-weight:600; }
  .meta .title { font-size:16px; line-height:1.4; font-weight:600;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .open { position:absolute; right:14px; bottom:calc(96px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; align-items:center; gap:4px; color:#fff; font-size:11px; text-decoration:none; }
  .open .circle { width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,.14); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; }
  .topbar { position:fixed; top:0; left:0; right:0; z-index:10; padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent); pointer-events:none; }
  .topbar .brand { font-weight:800; font-size:15px; letter-spacing:.3px; }
  .topbar .right { display:flex; align-items:center; gap:10px; pointer-events:auto; }
  .topbar .upd { font-size:11px; color:var(--muted); }
  #sound { width:40px; height:40px; border-radius:50%; border:0; background:rgba(255,255,255,.16);
    color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .center { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap:14px; color:var(--muted); text-align:center; padding:24px; }
  .spinner { width:34px; height:34px; border:3px solid rgba(255,255,255,.15); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hint { position:fixed; left:0; right:0; bottom:calc(40px + env(safe-area-inset-bottom)); text-align:center;
    color:#fff; font-size:13px; pointer-events:none; text-shadow:0 1px 6px rgba(0,0,0,.8); animation:fade 3s ease forwards; }
  @keyframes fade { 0%,70%{opacity:.95} 100%{opacity:0} }
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">코딩 쇼츠</span>
  <span class="right"><span class="upd" id="upd"></span><button id="sound" aria-label="소리">🔇</button></span>
</div>
<div id="feed"></div>
<div class="center" id="loading"><div class="spinner"></div><div>피드 불러오는 중…</div></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const PLAY_SVG='<svg viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,.35)"/><path d="M9 7.5v9l8-4.5z"/></svg>';
const YT_SVG='<svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M23 7.5a3 3 0 0 0-2.1-2.1C19 5 12 5 12 5s-7 0-8.9.4A3 3 0 0 0 1 7.5 31 31 0 0 0 .6 12 31 31 0 0 0 1 16.5a3 3 0 0 0 2.1 2.1C5 19 12 19 12 19s7 0 8.9-.4a3 3 0 0 0 2.1-2.1A31 31 0 0 0 23.4 12 31 31 0 0 0 23 7.5zM9.8 15.3V8.7l5.7 3.3z"/></svg>';

const feedEl=document.getElementById('feed');
const soundBtn=document.getElementById('sound');
let soundOn = localStorage.getItem('soundOn')==='0' ? false : true; // 기본 켜짐
let interacted=false, apiReady=false, active=null, pending=null;
const players=new Map();

function thumb(id){ return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`; }
function updIcon(){ soundBtn.textContent = (soundOn && interacted) ? '🔊' : '🔇'; }

function applySound(){
  const p=active&&players.get(active);
  if(!p||!p.unMute) return;
  if(soundOn && interacted){ try{p.unMute(); p.setVolume(100);}catch(e){} } else { try{p.mute();}catch(e){} }
  updIcon();
}
function markInteracted(){ if(interacted) return; interacted=true; applySound(); }
['touchstart','pointerdown','keydown'].forEach(ev=>window.addEventListener(ev,markInteracted,{passive:true}));
feedEl.addEventListener('scroll',markInteracted,{passive:true});

soundBtn.addEventListener('click',(e)=>{
  e.stopPropagation(); interacted=true; soundOn=!soundOn;
  localStorage.setItem('soundOn', soundOn?'1':'0'); applySound();
});

function activate(slide){
  if(!apiReady){ pending=slide; return; }
  if(active===slide) return;
  if(active) deactivate(active);
  active=slide;
  const badge=slide.querySelector('.play-badge'); if(badge) badge.style.display='none';
  const holder=slide.querySelector('.player'); holder.innerHTML='<div></div>';
  const id=slide.dataset.id;
  const startMuted = !(soundOn && interacted);
  const p=new YT.Player(holder.firstChild,{
    videoId:id,
    playerVars:{autoplay:1,playsinline:1,loop:1,playlist:id,controls:1,rel:0,modestbranding:1,mute:startMuted?1:0},
    events:{ onReady:(e)=>{
      if(soundOn && interacted){ e.target.unMute(); e.target.setVolume(100); } else { e.target.mute(); }
      e.target.playVideo(); updIcon();
    }}
  });
  players.set(slide,p);
}
function deactivate(slide){
  const p=players.get(slide);
  if(p){ try{p.destroy();}catch(e){} players.delete(slide); }
  const h=slide.querySelector('.player'); if(h) h.innerHTML='';
  const b=slide.querySelector('.play-badge'); if(b) b.style.display='';
}

const io=new IntersectionObserver((es)=>{
  es.forEach(e=>{ if(e.isIntersecting && e.intersectionRatio>0.6) activate(e.target); });
},{root:feedEl,threshold:[0,0.6,1]});

window.onYouTubeIframeAPIReady=()=>{ apiReady=true; if(pending){ const s=pending; pending=null; activate(s); } };

function makeSlide(item){
  const s=document.createElement('section'); s.className='slide'; s.dataset.id=item.id;
  s.innerHTML=`
    <div class="thumb" style="background-image:url('${thumb(item.id)}')"></div>
    <div class="player"></div>
    <div class="play-badge">${PLAY_SVG}</div>
    <a class="open" href="https://www.youtube.com/shorts/${item.id}" target="_blank" rel="noopener">
      <span class="circle">${YT_SVG}</span>YouTube</a>
    <div class="meta"><div class="ch">@ ${item.channel||''}</div>
      <div class="title">${(item.title||'').replace(/</g,'&lt;')}</div></div>`;
  return s;
}

async function load(){
  try{
    const res=await fetch('feed.json?t='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    const items=data.items||[];
    if(!items.length){ document.getElementById('loading').innerHTML='아직 쇼츠가 없어요.<br>매일 오전 8시에 채워집니다.'; return; }
    items.forEach(it=>{ const s=makeSlide(it); feedEl.appendChild(s); io.observe(s); });
    document.getElementById('loading').remove();
    if(data.updated){ const d=new Date(data.updated);
      document.getElementById('upd').textContent='업데이트 '+d.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'})+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
    const hint=document.createElement('div'); hint.className='hint'; hint.textContent='화면을 한 번 탭하면 소리가 켜져요 🔊';
    document.body.appendChild(hint); setTimeout(()=>hint.remove(),3000);
    const first=feedEl.querySelector('.slide'); if(first) activate(first);
    updIcon();
  }catch(err){ document.getElementById('loading').innerHTML='피드를 불러오지 못했어요.<br><small>'+err+'</small>'; }
}
load();

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
</body>
</html>
