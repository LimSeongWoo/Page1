<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>코딩 쇼츠</title>
<style>
  :root { --bg:#000; --fg:#fff; --muted:#9aa0a6; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
  #feed { height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; }
  #feed::-webkit-scrollbar { display:none; }
  .slide { position:relative; height:100dvh; width:100%; scroll-snap-align:start; scroll-snap-stop:always;
    overflow:hidden; background:#000; display:flex; align-items:center; justify-content:center; }
  .bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:blur(36px) brightness(.4); transform:scale(1.3); }
  .frame { position:relative; width:min(100vw,calc(100dvh*9/16)); height:100dvh; }
  .frame > div, .frame iframe { width:100%; height:100%; border:0; display:block; }
  .tap { position:absolute; inset:0; z-index:5; }
  .ph { position:absolute; inset:0; background-size:cover; background-position:center; z-index:1; }
  .pause { position:absolute; inset:0; z-index:4; display:none; align-items:center; justify-content:center; pointer-events:none; }
  .pause svg { width:80px; height:80px; opacity:.92; filter:drop-shadow(0 2px 12px rgba(0,0,0,.7)); }
  .slide.paused .pause { display:flex; }
  .meta { position:absolute; left:0; right:78px; bottom:0; z-index:6; padding:18px 18px calc(22px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(0,0,0,.82),rgba(0,0,0,.3) 60%,transparent); pointer-events:none; }
  .meta .ch { font-size:13px; color:#eee; margin-bottom:6px; font-weight:700; }
  .meta .title { font-size:15px; line-height:1.4; font-weight:600;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .nav { position:fixed; right:12px; bottom:calc(96px + env(safe-area-inset-bottom)); z-index:9; }
  .nav a { width:50px; height:50px; border-radius:50%; background:rgba(229,57,53,.85); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:18px; text-decoration:none; backdrop-filter:blur(8px); }
  .topbar { position:fixed; top:0; left:0; right:0; z-index:10; padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent); pointer-events:none; }
  .topbar .brand { font-weight:800; font-size:15px; }
  .topbar .right { display:flex; align-items:center; gap:10px; pointer-events:auto; }
  .topbar .upd { font-size:11px; color:var(--muted); }
  #sound { width:42px; height:42px; border-radius:50%; border:0; background:rgba(255,255,255,.2); color:#fff; font-size:19px; cursor:pointer; }
  .center { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap:14px; color:var(--muted); text-align:center; padding:24px; background:#000; }
  .spinner { width:34px; height:34px; border:3px solid rgba(255,255,255,.15); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hint { position:fixed; left:0; right:0; bottom:calc(36px + env(safe-area-inset-bottom)); z-index:11; text-align:center;
    color:#fff; font-size:13px; pointer-events:none; text-shadow:0 1px 6px rgba(0,0,0,.85); animation:fade 3.4s ease forwards; }
  @keyframes fade { 0%,75%{opacity:.96} 100%{opacity:0} }
</style>
</head>
<body>
<div class="topbar"><span class="brand">코딩 쇼츠</span>
  <span class="right"><span class="upd" id="upd"></span><button id="sound" aria-label="소리">🔇</button></span></div>
<div id="feed"></div>
<div class="nav"><a class="yt" id="open" href="#" target="_blank" rel="noopener" aria-label="유튜브에서 열기">▶</a></div>
<div class="center" id="loading"><div class="spinner"></div><div>피드 불러오는 중…</div></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const PAUSE='<svg viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,.35)"/><path d="M9 8h2v8H9zM13 8h2v8h-2z"/></svg>';
const feedEl=document.getElementById('feed');
const soundBtn=document.getElementById('sound');
const openBtn=document.getElementById('open');
let items=[], apiReady=false, active=-1, interacted=false, pendingActive=null;
let soundOn = localStorage.getItem('soundOn')==='0' ? false : true;
const players=new Map();
const slides=[];

function thumb(id){ return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`; }
function updIcon(){ soundBtn.textContent=(soundOn&&interacted)?'🔊':'🔇'; }
function applyTo(p){ if(!p||!p.unMute) return;
  if(soundOn&&interacted){ try{p.unMute(); p.setVolume(100);}catch(e){} } else { try{p.mute();}catch(e){} } }
function markInteracted(){ if(interacted) return; interacted=true; applyTo(players.get(active)); updIcon(); }
['touchstart','pointerdown','keydown'].forEach(ev=>window.addEventListener(ev,markInteracted,{passive:true}));
soundBtn.addEventListener('click',(e)=>{ e.stopPropagation(); interacted=true; soundOn=!soundOn;
  localStorage.setItem('soundOn',soundOn?'1':'0'); applyTo(players.get(active)); updIcon(); });

function create(idx, autoplay){
  const holder=slides[idx].querySelector('.frame'); holder.innerHTML='<div></div>';
  const id=items[idx].id;
  const p=new YT.Player(holder.firstChild,{
    videoId:id,
    playerVars:{autoplay:autoplay?1:0,mute:1,playsinline:1,loop:1,playlist:id,controls:0,rel:0,modestbranding:1,fs:0,iv_load_policy:3,disablekb:1},
    events:{
      onReady:(e)=>{ const ph=slides[idx].querySelector('.ph'); if(ph) ph.style.display='none';
        if(idx===active){ try{e.target.playVideo();}catch(_){} applyTo(e.target);} else { try{e.target.mute(); e.target.pauseVideo();}catch(_){} } },
      onStateChange:(e)=>{ if(e.data===YT.PlayerState.PLAYING && idx===active) applyTo(e.target);
                           if(e.data===YT.PlayerState.ENDED && idx===active){ try{e.target.seekTo(0); e.target.playVideo();}catch(_){}}}
    }
  });
  players.set(idx,p); return p;
}
function setActive(idx){
  if(idx<0||idx>=items.length) return;
  if(idx!==active){
    const prev=players.get(active);
    if(prev){ try{prev.pauseVideo(); prev.mute();}catch(e){} }
    if(active>=0&&slides[active]) slides[active].classList.remove('paused');
    active=idx;
    openBtn.href='https://www.youtube.com/shorts/'+items[idx].id;
  }
  if(!apiReady){ pendingActive=idx; return; }
  let p=players.get(idx);
  if(!p){ p=create(idx,true); } else { try{p.playVideo();}catch(e){} }
  applyTo(p);
  // 양옆 미리 로드 (도착 즉시 재생되도록)
  [idx+1,idx-1].forEach(j=>{ if(j>=0&&j<items.length&&!players.has(j)) create(j,false); });
  // 멀리 있는 건 정리
  players.forEach((pl,i)=>{ if(Math.abs(i-idx)>2){ try{pl.destroy();}catch(e){} players.delete(i);
    const f=slides[i].querySelector('.frame'); if(f) f.innerHTML='';
    const ph=slides[i].querySelector('.ph'); if(ph) ph.style.display='';
    slides[i].classList.remove('paused'); }});
  updIcon();
}
function togglePlay(){
  const p=players.get(active); if(!p||!p.getPlayerState) return;
  try{ if(p.getPlayerState()===YT.PlayerState.PLAYING){ p.pauseVideo(); slides[active].classList.add('paused'); }
       else { p.playVideo(); slides[active].classList.remove('paused'); } }catch(e){}
}

const io=new IntersectionObserver((es)=>{
  es.forEach(e=>{ if(e.isIntersecting && e.intersectionRatio>0.55){ markInteracted(); setActive(+e.target.dataset.idx);} });
},{root:feedEl,threshold:[0,0.55,1]});

window.onYouTubeIframeAPIReady=()=>{ apiReady=true; if(pendingActive!=null){ const i=pendingActive; pendingActive=null; setActive(i);} };

async function load(){
  try{
    const res=await fetch('feed.json?t='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    items=data.items||[];
    if(!items.length){ document.getElementById('loading').innerHTML='아직 쇼츠가 없어요.<br>매일 오전 8시에 채워집니다.'; return; }
    items.forEach((it,i)=>{
      const t=thumb(it.id);
      const s=document.createElement('section'); s.className='slide'; s.dataset.idx=i;
      s.innerHTML=`<div class="bg" style="background-image:url('${t}')"></div>
        <div class="frame"><div class="ph" style="background-image:url('${t}')"></div></div>
        <div class="tap"></div><div class="pause">${PAUSE}</div>
        <div class="meta"><div class="ch">${it.channel?('@ '+it.channel):''}</div>
          <div class="title">${(it.title||'').replace(/</g,'&lt;')}</div></div>`;
      feedEl.appendChild(s); slides.push(s); io.observe(s);
    });
    document.getElementById('loading').remove();
    feedEl.addEventListener('click',(e)=>{ if(e.target.classList.contains('tap')) togglePlay(); });
    if(data.updated){ const d=new Date(data.updated);
      document.getElementById('upd').textContent='업데이트 '+d.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'})+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
    setActive(0);
    const hint=document.createElement('div'); hint.className='hint'; hint.textContent='위로 넘기면 자동재생 · 탭=소리/정지';
    document.body.appendChild(hint); setTimeout(()=>hint.remove(),3400);
    updIcon();
  }catch(err){ document.getElementById('loading').innerHTML='피드를 불러오지 못했어요.<br><small>'+err+'</small>'; }
}
load();

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
</body>
</html>
