<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>코딩 쇼츠</title>
<style>
  :root { --bg:#000; --fg:#fff; --muted:#9aa0a6; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    overscroll-behavior:none; }
  #feed { position:relative; z-index:2; height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; scroll-behavior:smooth; }
  #feed::-webkit-scrollbar { display:none; }
  .slide { position:relative; height:100dvh; width:100%; scroll-snap-align:start; scroll-snap-stop:always;
    background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .slide .bg { position:absolute; inset:0; background-size:cover; background-position:center;
    filter:blur(34px) brightness(.42); transform:scale(1.3); }
  .slide .thumb { position:relative; width:min(100vw,calc(100dvh*9/16)); height:100dvh;
    background-size:cover; background-position:center; }
  /* 고정 플레이어 하나 (주변 여백은 슬라이드 블러 배경이 비쳐서 채움) */
  #stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index:5; transition:opacity .12s ease; }
  #stage.hide { opacity:0; }
  #pbox { width:min(100vw,calc(100dvh*9/16)); height:100dvh; }
  #player, #player iframe { width:100%; height:100%; border:0; display:block; }
  .meta { position:fixed; left:0; right:72px; bottom:0; z-index:8; padding:18px 18px calc(24px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(0,0,0,.8),rgba(0,0,0,.35) 60%,transparent); pointer-events:none;
    max-width:760px; }
  .meta .ch { font-size:13px; color:#eee; margin-bottom:6px; font-weight:700; }
  .meta .title { font-size:16px; line-height:1.4; font-weight:600;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .rail { position:fixed; right:14px; bottom:calc(92px + env(safe-area-inset-bottom)); z-index:9;
    display:flex; flex-direction:column; gap:16px; pointer-events:auto; }
  .rail a, .rail button { width:48px; height:48px; border:0; border-radius:50%; background:rgba(255,255,255,.16);
    color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none;
    font-size:20px; backdrop-filter:blur(6px); }
  .topbar { position:fixed; top:0; left:0; right:0; z-index:10; padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent); pointer-events:none; }
  .topbar .brand { font-weight:800; font-size:15px; }
  .topbar .upd { font-size:11px; color:var(--muted); }
  .center { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap:14px; color:var(--muted); text-align:center; padding:24px; background:#000; }
  .spinner { width:34px; height:34px; border:3px solid rgba(255,255,255,.15); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hint { position:fixed; left:0; right:0; bottom:calc(40px + env(safe-area-inset-bottom)); z-index:11; text-align:center;
    color:#fff; font-size:13px; pointer-events:none; text-shadow:0 1px 6px rgba(0,0,0,.85); animation:fade 3.2s ease forwards; }
  @keyframes fade { 0%,72%{opacity:.96} 100%{opacity:0} }
</style>
</head>
<body>
<div class="topbar"><span class="brand">코딩 쇼츠</span><span class="upd" id="upd"></span></div>
<div id="feed"></div>
<div id="stage"><div id="pbox"><div id="player"></div></div></div>
<div class="meta"><div class="ch" id="m-ch"></div><div class="title" id="m-title"></div></div>
<div class="rail">
  <button id="sound" aria-label="소리">🔇</button>
  <a id="open" href="#" target="_blank" rel="noopener" aria-label="YouTube에서 열기">▶</a>
</div>
<div class="center" id="loading"><div class="spinner"></div><div>피드 불러오는 중…</div></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const feedEl=document.getElementById('feed');
const stage=document.getElementById('stage');
const soundBtn=document.getElementById('sound');
const openBtn=document.getElementById('open');
let items=[], player=null, apiReady=false, curIdx=-1, curId=null;
let interacted=false;
let soundOn = localStorage.getItem('soundOn')==='0' ? false : true;

function thumb(id){ return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`; }
function updIcon(){ soundBtn.textContent = (soundOn && interacted) ? '🔊' : '🔇'; }

function applySound(){
  if(!player||!player.unMute) return;
  if(soundOn && interacted){ try{player.unMute(); player.setVolume(100);}catch(e){} }
  else { try{player.mute();}catch(e){} }
  updIcon();
}
function markInteracted(){ if(interacted) return; interacted=true; applySound(); }
['touchstart','pointerdown','keydown'].forEach(ev=>window.addEventListener(ev,markInteracted,{passive:true}));

soundBtn.addEventListener('click',(e)=>{
  e.stopPropagation(); interacted=true; soundOn=!soundOn;
  localStorage.setItem('soundOn', soundOn?'1':'0'); applySound();
});

function updateMeta(it){
  document.getElementById('m-ch').textContent = it.channel ? '@ '+it.channel : '';
  document.getElementById('m-title').textContent = it.title||'';
  openBtn.href = 'https://www.youtube.com/shorts/'+it.id;
}
function loadIdx(idx){
  const it=items[idx]; if(!it) return;
  curIdx=idx;
  if(it.id!==curId){
    curId=it.id; updateMeta(it);
    if(player&&player.loadVideoById){ player.loadVideoById(it.id); applySound(); }
  }
}

let scrollTimer=null;
feedEl.addEventListener('scroll',()=>{
  markInteracted(); stage.classList.add('hide');
  clearTimeout(scrollTimer); scrollTimer=setTimeout(settle,110);
},{passive:true});
function settle(){
  loadIdx(Math.round(feedEl.scrollTop/feedEl.clientHeight));
  stage.classList.remove('hide');
}

window.onYouTubeIframeAPIReady=()=>{
  player=new YT.Player('player',{
    playerVars:{playsinline:1,controls:0,rel:0,modestbranding:1,fs:0,iv_load_policy:3,disablekb:1},
    events:{
      onReady:()=>{ apiReady=true; if(items.length){ loadIdx(0); } applySound(); },
      onStateChange:(e)=>{
        if(e.data===YT.PlayerState.ENDED){ try{player.seekTo(0); player.playVideo();}catch(_){} }
        if(e.data===YT.PlayerState.PLAYING){ applySound(); }
      }
    }
  });
};

async function load(){
  try{
    const res=await fetch('feed.json?t='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    items=data.items||[];
    if(!items.length){ document.getElementById('loading').innerHTML='아직 쇼츠가 없어요.<br>매일 오전 8시에 채워집니다.'; return; }
    items.forEach(it=>{
      const t=thumb(it.id);
      const s=document.createElement('section'); s.className='slide';
      s.innerHTML=`<div class="bg" style="background-image:url('${t}')"></div><div class="thumb" style="background-image:url('${t}')"></div>`;
      feedEl.appendChild(s);
    });
    document.getElementById('loading').remove();
    if(data.updated){ const d=new Date(data.updated);
      document.getElementById('upd').textContent='업데이트 '+d.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'})+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
    updateMeta(items[0]);
    if(apiReady && player){ loadIdx(0); }
    const hint=document.createElement('div'); hint.className='hint'; hint.textContent='한 번 탭하면 소리가 켜져요 🔊';
    document.body.appendChild(hint); setTimeout(()=>hint.remove(),3200);
    updIcon();
  }catch(err){ document.getElementById('loading').innerHTML='피드를 불러오지 못했어요.<br><small>'+err+'</small>'; }
}
load();

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
</body>
</html>
